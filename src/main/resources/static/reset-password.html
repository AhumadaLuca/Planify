<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">

	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="icon" type="image/png" sizes="32x32" href="assets/icons/planify_circulo.svg">
	<link rel="icon" type="image/png" sizes="16x16" href="assets/icons/planify_circulo.svg">
	<title data-i18n="resetPasswordTitulo"></title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

	<style>
		body {
			background: rgb(35, 35, 35);
		}

		/* contenedor centrado */
		.page-wrapper {
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			flex-direction: column;
			padding: 20px;
		}

		/* tarjeta */
		.reset-card {
			width: 100%;
			max-width: 420px;
			min-width: 280px;
		}

		/* móvil */
		@media (max-width:576px) {

			.reset-card {
				max-width: 100%;
			}

			.card-body {
				padding: 1.5rem;
			}
		}
	</style>

</head>

<body>

	<div class="page-wrapper">

		<img src="assets/icons/planify_circulo.svg" class="imagen" alt="Planify" style="width:150px; height: 150px;">

		<div class="card shadow reset-card">


			<div class="card-header bg-primary text-white text-center">
				<h5 data-i18n="resetPasswordTitulo"></h5>
			</div>

			<div class="card-body">

				<form id="cambiarPassword">

					<div class="mb-3">
						<label class="form-label" data-i18n="nuevaPassword"></label>
						<input type="password" id="password" class="form-control" minlength="6" required
							data-i18n-placeholder="nuevaPasswordPlaceholder">
					</div>

					<div class="mb-3">
						<label class="form-label" data-i18n="confirmarPassword"></label>
						<input type="password" id="password2" class="form-control" minlength="6" required
							data-i18n-placeholder="confirmarPasswordPlaceholder">
					</div>

					<div id="msg" class="alert d-none"></div>

					<button class="btn btn-primary w-100" type="submit" data-i18n="cambiarPassword"></button>

				</form>

			</div>

		</div>

	</div>

	<div class="position-fixed top-0 end-0 p-3" style="z-index: 1055">
		<div id="toastContainer"></div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script type="module" src="js/cambiarContra.js"></script>

</body>
